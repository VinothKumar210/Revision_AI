# Render deployment configuration
# Frontend: Next.js on Render Static/Web Service
# Backend: FastAPI on Render Web Service

services:
  # ── Frontend (Next.js) ──────────────────────
  - type: web
    name: revision-ai-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npx prisma generate && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: revision-ai-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        value: /dashboard
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        value: /onboarding

  # ── Backend (FastAPI) ───────────────────────
  - type: web
    name: revision-ai-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+14155238886
      - key: FRONTEND_URL
        fromService:
          name: revision-ai-frontend
          type: web
          property: host
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: SCHEDULER_INTERVAL_MINUTES
        value: "5"
